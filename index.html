<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/favicon.png">
    <title>AI Coding Agent Setup Guide</title>
    <meta property="og:url" content="https://ai-coding-guide-with-gstack.vercel.app/">
    <meta property="og:type" content="website">
    <meta property="og:title" content="AI Coding Agent Complete Setup Guide">
    <meta property="og:description" content="Claude Code + Codex + gstack + Ralph — from scratch setup guide in 3 languages.">
    <meta property="og:image" content="https://ai-coding-guide-with-gstack.vercel.app/og/og-en.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="AI Coding Agent Complete Setup Guide">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&family=Noto+Sans:wght@400;700;900&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1a2e;
            --accent: #3d5a80;
            --accent-light: #5b7ea1;
            --text: #e8e8e8;
            --text-muted: rgba(255,255,255,0.5);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            background: var(--bg);
            font-family: 'Noto Sans', 'Noto Sans KR', 'Noto Sans JP', sans-serif;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column;
        }

        /* Grid background */
        .grid-bg {
            position: fixed; inset: 0; pointer-events: none;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* Accent block */
        .accent-block {
            position: fixed; top: 0; right: 0; width: 30%; height: 100%;
            background: var(--accent);
            clip-path: polygon(25% 0, 100% 0, 100% 100%, 0% 100%);
            opacity: 0.15;
        }

        .content {
            position: relative; z-index: 2; text-align: center;
            padding: clamp(1rem, 4vw, 3rem);
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .label {
            font-weight: 800; font-size: clamp(0.6rem, 1vw, 0.75rem);
            letter-spacing: 0.2em; text-transform: uppercase;
            color: var(--accent-light); margin-bottom: clamp(0.8rem, 2vw, 1.5rem);
        }

        h1 {
            font-weight: 900; font-size: clamp(2rem, 5vw, 4rem);
            color: var(--text); line-height: 1.1; letter-spacing: -0.03em;
            margin-bottom: clamp(0.5rem, 1.5vw, 1rem);
        }

        .subtitle {
            font-size: clamp(0.85rem, 1.3vw, 1.05rem);
            color: var(--text-muted); margin-bottom: clamp(2rem, 4vw, 3.5rem);
            line-height: 1.6;
        }

        .lang-grid {
            display: flex; gap: clamp(0.8rem, 2vw, 1.5rem);
            justify-content: center; flex-wrap: wrap;
        }

        .lang-card {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: clamp(0.5rem, 1vw, 0.8rem);
            width: clamp(140px, 18vw, 200px); height: clamp(140px, 18vw, 200px);
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px; cursor: pointer;
            text-decoration: none; color: var(--text);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative; overflow: hidden;
        }
        .lang-card::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(61,90,128,0.15), transparent);
            opacity: 0; transition: opacity 0.3s ease;
        }
        .lang-card:hover {
            border-color: var(--accent-light);
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(61,90,128,0.2);
        }
        .lang-card:hover::before { opacity: 1; }

        .lang-flag {
            font-size: clamp(2rem, 4vw, 3rem);
            position: relative; z-index: 1;
        }
        .lang-name {
            font-weight: 700; font-size: clamp(1rem, 1.5vw, 1.2rem);
            position: relative; z-index: 1;
        }
        .lang-native {
            font-size: clamp(0.7rem, 1vw, 0.85rem);
            color: var(--text-muted); position: relative; z-index: 1;
        }

        /* Stagger animation */
        .lang-card:nth-child(1) { animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.2s both; }
        .lang-card:nth-child(2) { animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.35s both; }
        .lang-card:nth-child(3) { animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.5s both; }

        .footer {
            position: fixed; bottom: clamp(1rem, 2vw, 2rem);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem; color: rgba(255,255,255,0.2);
            z-index: 2;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.2s !important;
            }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="accent-block"></div>

    <div class="content">
        <p class="label">Complete Setup Guide</p>
        <h1>AI Coding Agent<br>Setup Guide</h1>
        <p class="subtitle">Claude Code + Codex + gstack + Ralph</p>

        <div class="lang-grid">
            <a href="ai-coding-setup-guide-ko.html" class="lang-card">
                <span class="lang-flag">🇰🇷</span>
                <span class="lang-name">Korean</span>
                <span class="lang-native">한국어</span>
            </a>
            <a href="ai-coding-setup-guide-en.html" class="lang-card">
                <span class="lang-flag">🇺🇸</span>
                <span class="lang-name">English</span>
                <span class="lang-native">English</span>
            </a>
            <a href="ai-coding-setup-guide-ja.html" class="lang-card">
                <span class="lang-flag">🇯🇵</span>
                <span class="lang-name">Japanese</span>
                <span class="lang-native">日本語</span>
            </a>
        </div>
    </div>

    <div class="footer" style="text-align:center; font-family:'Noto Sans',sans-serif; font-size:clamp(0.65rem,1vw,0.8rem); line-height:1.7;">
        <strong style="color:rgba(255,255,255,0.75);">Brant Hwang</strong> <span style="color:rgba(255,255,255,0.5);">· brant@querypie.com</span><br>
        <span style="color:rgba(255,255,255,0.5);">Founder & CEO at QueryPie AI · </span><a href="https://www.querypie.com" target="_blank" style="color:var(--accent-light); text-decoration:none;">www.querypie.com</a>
    </div>
</body>
</html>
